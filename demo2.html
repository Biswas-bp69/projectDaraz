<!DOCTYPE html>
<html>

<head>
  <title>Smart Chatbot with Icon</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
    }

    /* Chat Icon Button */
    .chat-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #0f9d58;
      color: white;
      border: none;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      font-size: 26px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s;
    }

    .chat-btn:hover {
      transform: scale(1.1);
    }

    /* Chat Box */
    .chat-box {
      position: fixed;
      bottom: 90px;
      right: 20px;
      width: 360px;
      max-height: 500px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: #0f9d58;
      color: white;
      padding: 12px 15px;
      font-weight: bold;
      font-size: 16px;
    }

    #chatboxContent {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      font-size: 14px;
      background: #f9f9f9;
    }

    .chat-input {
      display: flex;
      border-top: 1px solid #ddd;
      background: #fff;
    }

    .chat-input input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    .chat-input button {
      padding: 10px 15px;
      border: none;
      background: #0f9d58;
      color: white;
      cursor: pointer;
      transition: background 0.2s;
    }

    .chat-input button:hover {
      background: #0c7a42;
    }

    .user,
    .bot {
      display: inline-block;
      padding: 10px 15px;
      margin: 5px 0;
      border-radius: 20px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .user {
      background: #1a73e8;
      color: white;
      align-self: flex-end;
    }

    .bot {
      background: #e0ffe0;
      color: #006400;
      align-self: flex-start;
    }

    #chatboxContent::-webkit-scrollbar {
      width: 6px;
    }

    #chatboxContent::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 3px;
    }

    #chatboxContent::-webkit-scrollbar-track {
      background: transparent;
    }
  </style>
</head>

<body>

  <!-- Chat Icon -->
  <button class="chat-btn" onclick="toggleChat()">💬</button>

  <!-- Chat Box -->
  <div class="chat-box" id="chatBox">
    <div class="chat-header">Smart Chatbot 🤖</div>
    <div id="chatboxContent">
      <div class="bot">Hello 👋 How can I help you?</div>
    </div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Type your message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    // Toggle Chat Box
    function toggleChat() {
      let box = document.getElementById("chatBox");
      box.style.display = box.style.display === "flex" ? "none" : "flex";
    }

    // Smart keyword responses
    const responses = [
      { keyword: "hello", reply: "Hello! How are you today? 😊" },
      { keyword: "hello sir", reply: "Hello Sir! Welcome back 🙏" },
      { keyword: "how are you", reply: "I'm fine! Thanks for asking 😎" },
      { keyword: "what is your name", reply: "My name is Smart Bot 🤖" },
      { keyword: "name", reply: "I am called Smart Chatbot!" },
      { keyword: "bye", reply: "Goodbye! Have a nice day 🌸" },
      { keyword: "thanks", reply: "You're welcome! 👍" },
      { keyword: "thank you", reply: "Anytime! 😊" },
      { keyword: "help", reply: "Sure! Tell me what you need help with." },
      { keyword: "weather", reply: "I don't have live weather info yet, sorry 😅" },
      { keyword: "news", reply: "I can’t fetch live news yet, but check your favorite news app!" },
      { keyword: "joke", reply: "Why did the computer go to the doctor? Because it caught a virus! 😂" },
      { keyword: "time", reply: `The current time is ${new Date().toLocaleTimeString()}` },
      { keyword: "date", reply: `Today is ${new Date().toLocaleDateString()}` }
    ];

    // Send Message
    function sendMessage() {
      let inputField = document.getElementById("userInput");
      let input = inputField.value.trim();
      let chatbox = document.getElementById("chatboxContent");

      if (input === "") return;

      // Show user message
      chatbox.innerHTML += `<div class="user"><b>You:</b> ${input}</div>`;

      // Get smart reply
      let reply = getSmartReply(input);

      setTimeout(() => {
        chatbox.innerHTML += `<div class="bot"><b>Bot:</b> ${reply}</div>`;
        chatbox.scrollTop = chatbox.scrollHeight;
      }, 300);

      inputField.value = "";
    }

    // Longest keyword match logic
    function getSmartReply(input) {
      input = input.toLowerCase();
      let matchedReply = null;
      let longestLength = 0;

      responses.forEach(item => {
        if (input.includes(item.keyword)) {
          if (item.keyword.length > longestLength) {
            longestLength = item.keyword.length;
            matchedReply = item.reply;
          }
        }
      });

      return matchedReply || "Sorry, I don't understand. Can you rephrase?";
    }

    // Enter key support
    document.getElementById("userInput").addEventListener("keypress", function (e) {
      if (e.key === "Enter") sendMessage();
    });
  </script>

</body>

</html>
